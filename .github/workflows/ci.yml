# Этап 8 дорожной карты: CI без ручных прогонов перед пушем.
# После git init + remote на GitHub — workflow запустится на push/PR в main/master.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Зависимости
        run: pip install -r requirements.txt

      - name: Тесты
        env:
          EMAIL_CHECK_DELIVERABILITY: "false"
        run: python -m pytest tests/ -q --tb=short

  web:
    name: Web (Next.js build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Установка
        run: npm ci

      - name: Сборка (типы встроены в next build)
        run: npm run build
